services:
  mysql:
    image: mysql:8.4
    container_name: be-a-mysql
    environment:
      MYSQL_DATABASE: enrollment
      MYSQL_USER: enrollment
      MYSQL_PASSWORD: enrollment
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
